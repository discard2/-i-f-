<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrollPeople</title>

  <!-- Pixel Font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Press Start 2P', cursive;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #11e4e4, #00c8ff, #004cff);
      background-size: 400% 400%;
      animation: bgMove 10s ease infinite;
      overflow-x: hidden;
      padding: 20px;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Title Box */
    .title-box {
      width: 90%;
      max-width: 800px;
      margin: 10px auto 30px;
      border: 15px solid #6fb8e9;
      padding: 30px 10px;
      text-align: center;
      border-radius: 15px;
      background: rgba(255,255,255,0.08);
    }

    .title-box h1 {
      font-size: clamp(22px, 4vw, 50px);
      color: white;
      text-shadow:
        -4px -4px 0 #000,
         4px -4px 0 #000,
        -4px  4px 0 #000,
         4px  4px 0 #000;
    }

    /* Profile Section */
    .profile {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 30px 20px 60px;
      flex-wrap: wrap;
    }

    .discord-box {
      text-align: center;
    }

    .discord-label {
      font-size: 12px;
      color: white;
      margin-bottom: 10px;
      text-shadow: 3px 3px #000;
    }

    .discord-box img {
      width: 140px;
      height: 140px;
      border-radius: 0;
      background: #5865F2;
    }

    .username {
      font-size: clamp(18px, 3vw, 30px);
      color: white;
      text-shadow:
        -3px -3px 0 #000,
         3px -3px 0 #000,
        -3px  3px 0 #000,
         3px  3px 0 #000;
    }

    /* Buttons */
    .menu {
      display: flex;
      flex-direction: column;
      gap: 35px;
      padding-left: 20px;
      margin-top: 20px;
    }

    .menu a {
      width: 320px;
      max-width: 90%;
      text-decoration: none;
      border: 15px solid #006b9f;
      padding: 28px 15px;
      text-align: center;
      color: white;
      font-size: clamp(14px, 2vw, 24px);
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
      text-shadow:
        -3px -3px 0 #000,
         3px -3px 0 #000,
        -3px  3px 0 #000,
         3px  3px 0 #000;
      transition: 0.25s ease;
    }

    .menu a:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.2);
    }

    .menu a:active {
      transform: scale(0.98);
    }

    @media (max-width: 600px) {
      .profile {
        flex-direction: column;
        align-items: flex-start;
      }

      .username {
        margin-left: 10px;
      }

      .menu {
        padding-left: 10px;
      }
    }
  </style>
</head>
<body>

  <!-- Title -->
  <div class="title-box">
    <h1>TrollPeople</h1>
  </div>

  <!-- Profile -->
  <div class="profile">
    <div class="discord-box">
      <div class="discord-label">discordusername</div>
      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" alt="Discord">
    </div>

    <div class="username">unilalaacreator</div>
  </div>

  <!-- Menu Buttons -->
  <div class="menu">
    <a href="troll.html">fakeNitro</a>
    <a href="virus.html">fakevirus</a>
    <a href="minecraft.html">fakeMinecraft</a>
  </div>

</body>
</html>
